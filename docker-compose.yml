version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ecotrack_backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    environment:
      - JWT_SECRET_KEY=ecotrack_secret_key_super_secure_987654321
      - DATABASE_URL=sqlite:///./ecotrack.db
      - GEMINI_API_KEY=${GEMINI_API_KEY}
    restart: always

  frontend:
    image: node:20-slim
    container_name: ecotrack_frontend
    working_dir: /app
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
    command: sh -c "npm install && npm run dev -- --host"
    depends_on:
      - backend
    restart: always
